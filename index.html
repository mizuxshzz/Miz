<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Aesthetic</title>
    <style>
        :root { --bg: #050505; --neon: #a18cd1; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { margin-bottom: 20px; color: var(--neon); }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border-radius: 10px; border: 1px solid #333; }
        .cell:hover { background: #222; }
        #status { margin-top: 20px; font-size: 18px; }
        button { margin-top: 20px; padding: 10px 20px; background: var(--neon); border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div><div class="cell" onclick="makeMove(1)"></div><div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div><div class="cell" onclick="makeMove(4)"></div><div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div><div class="cell" onclick="makeMove(7)"></div><div class="cell" onclick="makeMove(8)"></div>
    </div>
    <div id="status">Giliran Player X</div>
    <button onclick="resetGame()">Reset Game</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;

        function makeMove(i) {
            if (board[i] === "" && isGameActive) {
                board[i] = currentPlayer;
                document.getElementsByClassName('cell')[i].innerText = currentPlayer;
                
                if (checkWinner()) {
                    document.getElementById('status').innerText = "Player " + currentPlayer + " Menang!";
                    isGameActive = false;
                } else if (!board.includes("")) {
                    document.getElementById('status').innerText = "Permainan Seri!";
                    isGameActive = false;
                } else {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    document.getElementById('status').innerText = "Giliran Player " + currentPlayer;
                }
            }
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(win => win.every(index => board[index] === currentPlayer));
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            isGameActive = true;
            document.getElementById('status').innerText = "Giliran Player X";
            Array.from(document.getElementsByClassName('cell')).forEach(cell => cell.innerText = "");
        }
    </script>
</body>
</html>
